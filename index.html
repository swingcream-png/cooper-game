<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cooper">
<meta name="theme-color" content="#1a1a40">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<title>Sergeant Cooper: The Stolen Crystal</title>
<style>
  :root {
    --night: #1a1a40;
    --day: #aee3ff;
    --road: #3d4451;
    --grass: #7ec850;
    --ui: #ffffff;
    --accent: #ffd23f;
    --good: #34c759;
    --bad: #ff3b30;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Comic Sans MS", "Chalkboard SE", sans-serif; }
  #stage { position: fixed; inset: 0; background: var(--day); overflow: hidden; }

  .scene { position: absolute; inset: 0; display: none; overflow: hidden; }
  .scene.on { display: block; }

  /* sky / ground layers */
  .ground { position: absolute; left: 0; right: 0; bottom: 0; height: 28%; background: var(--road); }
  .ground.grass { background: var(--grass); }
  .ground::before { content: ""; position: absolute; top: 46%; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg, #ffd23f 0 60px, transparent 60px 120px); opacity: .85; }
  .ground.grass::before { display: none; }

  .bigprop { position: absolute; font-size: clamp(64px, 18vmin, 160px); line-height: 1; }
  .car { position: absolute; font-size: clamp(48px, 13vmin, 120px); line-height: 1; transition: left 2.2s ease-in-out, transform .4s; z-index: 5; }
  .car .tag { display: block; text-align: center; font-size: clamp(11px, 2.2vmin, 18px); font-weight: 800; color: #fff;
    background: rgba(0,0,0,.55); border-radius: 10px; padding: 1px 8px; margin-top: 2px; }
  .flip { transform: scaleX(-1); }
  .flip .tag { transform: scaleX(-1); }

  /* dialogue */
  #bubble { position: absolute; top: 3%; left: 50%; transform: translateX(-50%); max-width: 86%;
    background: var(--ui); border: 4px solid #222; border-radius: 22px; padding: 12px 20px;
    font-size: clamp(16px, 3.6vmin, 28px); font-weight: 700; color: #222; z-index: 50;
    box-shadow: 0 6px 0 rgba(0,0,0,.25); display: none; }
  #bubble .who { color: #2563eb; display: block; font-size: .78em; }
  #bubble.villain .who { color: var(--bad); }
  #bubble .tap { display: block; text-align: right; font-size: .62em; color: #999; margin-top: 4px; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  /* generic big button */
  .bigbtn { position: absolute; left: 50%; transform: translateX(-50%); bottom: 6%;
    background: var(--accent); border: 4px solid #222; border-radius: 999px;
    font-size: clamp(18px, 4.5vmin, 34px); font-weight: 900; padding: 14px 34px; color: #222;
    box-shadow: 0 6px 0 rgba(0,0,0,.3); z-index: 60; cursor: pointer; }
  .bigbtn:active { transform: translateX(-50%) translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.3); }

  /* voice toggle */
  #voicebtn { position: absolute; left: 10px; bottom: 10px; z-index: 95; background: var(--ui);
    border: 3px solid #222; border-radius: 50%; width: clamp(44px, 9vmin, 64px); height: clamp(44px, 9vmin, 64px);
    font-size: clamp(20px, 4.5vmin, 32px); cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.25); }
  #voicebtn.off { opacity: .55; }

  /* progress dots */
  #dots { position: absolute; top: 8px; right: 12px; z-index: 90; display: flex; gap: 6px; }
  #dots span { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,.5); border: 2px solid #222; }
  #dots span.done { background: var(--good); }
  #dots span.now { background: var(--accent); }

  /* title scene */
  #s-title { background: linear-gradient(var(--night), #2d2d6b); text-align: center; }
  #s-title h1 { color: #fff; font-size: clamp(26px, 7vmin, 60px); padding-top: 12vh; text-shadow: 0 4px 0 #000; }
  #s-title h2 { color: var(--accent); font-size: clamp(18px, 4.5vmin, 36px); margin-top: 8px; }
  #s-title .moon { position: absolute; top: 6%; left: 8%; font-size: 12vmin; }
  .star { position: absolute; color: #fff; animation: blink 2s infinite; }

  /* night scenes */
  .night { background: linear-gradient(var(--night), #2d2d6b); }
  .night .ground { background: #23232f; }

  /* museum clue game */
  .clue { position: absolute; font-size: clamp(40px, 10vmin, 90px); z-index: 20; cursor: pointer; transition: transform .3s; }
  .clue.found { animation: pop .5s; }
  .clue .ring { display: none; }
  .clue.found .ring { display: block; position: absolute; inset: -12px; border: 5px dashed var(--good); border-radius: 50%; animation: spin 3s linear infinite; }
  @keyframes pop { 40% { transform: scale(1.5); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  #clue-count { position: absolute; top: 8px; left: 12px; z-index: 90; background: var(--ui); border: 3px solid #222;
    border-radius: 14px; padding: 6px 14px; font-size: clamp(15px, 3.4vmin, 26px); font-weight: 900; display: none; }

  /* machine scene */
  #machine { position: absolute; left: 50%; bottom: 24%; transform: translateX(-50%); width: clamp(180px, 42vmin, 380px);
    height: clamp(130px, 30vmin, 270px); background: #555; border: 6px solid #222; border-radius: 18px; z-index: 4; }
  #machine .pipes { position: absolute; top: -28px; left: 12%; font-size: clamp(22px, 6vmin, 44px); }
  #slot { position: absolute; left: 50%; top: 38%; transform: translate(-50%, -50%); width: clamp(54px, 13vmin, 110px);
    height: clamp(54px, 13vmin, 110px); border: 5px dashed var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: clamp(28px, 7vmin, 60px); color: var(--accent); }
  #crystal { position: absolute; font-size: clamp(44px, 11vmin, 96px); z-index: 30; cursor: grab; filter: drop-shadow(0 0 12px #7df9ff); }
  #lamp { position: absolute; font-size: clamp(44px, 11vmin, 96px); z-index: 25; cursor: pointer; opacity: .45; }
  #lamp.ready { opacity: 1; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { transform: scale(1.15); } }
  #beamline { position: absolute; height: 10px; background: linear-gradient(90deg, #fffbe0, #7df9ff); z-index: 6;
    transform-origin: left center; display: none; box-shadow: 0 0 18px #7df9ff; border-radius: 5px; }
  #ivy { position: absolute; left: 50%; bottom: 24%; transform: translateX(-50%) scale(0); font-size: clamp(60px, 16vmin, 150px);
    transform-origin: bottom center; transition: transform 1.6s cubic-bezier(.2,1.4,.4,1); z-index: 35; }

  /* quiz */
  .quizq { position: absolute; top: 16%; left: 50%; transform: translateX(-50%); width: 88%;
    background: #fff; border: 4px solid #222; border-radius: 20px; padding: 14px 18px; text-align: center;
    font-size: clamp(17px, 4vmin, 30px); font-weight: 800; z-index: 40; }
  .quizopts { position: absolute; top: 42%; left: 50%; transform: translateX(-50%); display: flex; gap: 4vmin; z-index: 40; }
  .qopt { background: #fff; border: 5px solid #222; border-radius: 22px; padding: 12px 16px; text-align: center; cursor: pointer;
    font-size: clamp(13px, 3vmin, 24px); font-weight: 800; width: clamp(96px, 24vmin, 200px); }
  .qopt .face { display: block; font-size: clamp(40px, 10vmin, 90px); }
  .qopt.right { border-color: var(--good); background: #e8ffe8; animation: pop .5s; }
  .qopt.wrong { border-color: var(--bad); animation: shake .4s; }
  @keyframes shake { 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
  #projector-screen { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); color: #fff; font-size: clamp(15px,3.4vmin,26px); font-weight: 900; z-index: 39; }

  /* griffin timing game */
  #stumpzone { position: absolute; bottom: 10%; left: 41%; width: 18%; height: 16%; border: 5px dashed #fff;
    border-radius: 18px; z-index: 3; display: flex; align-items: center; justify-content: center;
    font-size: clamp(34px, 9vmin, 80px); }
  #stumpbtn { background: var(--bad); color: #fff; }

  /* roadblock drag game */
  .barrier { position: absolute; font-size: clamp(40px, 10vmin, 90px); z-index: 30; cursor: grab; }
  .bslot { position: absolute; width: clamp(54px, 12vmin, 105px); height: clamp(54px, 12vmin, 105px);
    border: 4px dashed #fff; border-radius: 14px; z-index: 2; }
  .bslot.filled { border-style: solid; border-color: var(--good); }

  /* smog chase */
  #boostbtn { background: var(--bad); color: #fff; bottom: 4%; }
  #chasemeter { position: absolute; top: 14%; left: 50%; transform: translateX(-50%); width: 70%; height: 26px;
    background: #fff; border: 4px solid #222; border-radius: 999px; z-index: 40; overflow: hidden; display: none; }
  #chasemeter i { display: block; height: 100%; width: 0%; background: var(--good); transition: width .25s; }

  /* finale */
  #s-end { background: linear-gradient(#ffe9a8, #aee3ff); text-align: center; }
  #badge { margin-top: 14vh; display: inline-block; background: #fff; border: 6px solid var(--accent); border-radius: 30px;
    padding: 4vmin 7vmin; font-size: clamp(20px, 5vmin, 42px); font-weight: 900; color: #222;
    box-shadow: 0 8px 0 rgba(0,0,0,.2); animation: pop .8s; }
  #badge .big { font-size: 2.2em; display: block; }
  .confetti { position: absolute; top: -5%; font-size: 5vmin; animation: fall linear infinite; z-index: 80; }
  @keyframes fall { to { transform: translateY(115vh) rotate(720deg); } }

  .shakecam { animation: camshake .5s; }
  @keyframes camshake { 20% { transform: translate(6px,-4px); } 50% { transform: translate(-6px,4px); } 80% { transform: translate(4px,2px); } }
  .boom { position: absolute; font-size: clamp(50px,13vmin,120px); z-index: 45; animation: pop .6s; }
</style>
</head>
<body>
<div id="stage">
  <div id="dots"></div>
  <button id="voicebtn" title="voice on/off">🔊</button>
  <div id="bubble"><span class="who"></span><span class="txt"></span><span class="tap">tap ▸</span></div>
  <div id="clue-count">🔍 Clues: <b id="cluen">0</b>/3</div>

  <!-- 0 TITLE -->
  <div class="scene on" id="s-title">
    <div class="moon">🌙</div>
    <h1>🚓 SERGEANT COOPER</h1>
    <h2>In Search of the Stolen Crystal 💎</h2>
    <div style="margin-top:6vh;font-size:14vmin">🚓 💨</div>
    <button class="bigbtn" id="startbtn">▶ START THE CASE</button>
  </div>

  <!-- 1 JAILBREAK -->
  <div class="scene night" id="s-jail">
    <div class="ground"></div>
    <div class="bigprop" style="left:6%;bottom:24%">🏢<div style="font-size:.4em;text-align:center;color:#fff;font-weight:900">JAIL 🔒</div></div>
  </div>

  <!-- 2 MUSEUM -->
  <div class="scene night" id="s-museum">
    <div class="ground"></div>
    <div class="bigprop" style="left:50%;transform:translateX(-50%);bottom:24%">🏛️<div style="font-size:.35em;text-align:center;color:#fff;font-weight:900">MUSEUM</div></div>
  </div>

  <!-- 3 MACHINE -->
  <div class="scene night" id="s-machine">
    <div class="ground grass" style="background:#1f3a1f"></div>
    <div id="machine"><div class="pipes">⚙️🧪⚙️</div><div id="slot">?</div></div>
    <div id="beamline"></div>
    <div id="ivy">🌿</div>
    <div id="crystal">💎</div>
    <div id="lamp">🔦</div>
  </div>

  <!-- 4 BRIEFING -->
  <div class="scene night" id="s-brief">
    <div class="ground" style="background:#23232f"></div>
    <div id="projector-screen">📽️ POLICE BRIEFING — KNOW YOUR VILLAINS</div>
  </div>

  <!-- 5 GRIFFIN -->
  <div class="scene" id="s-griffin">
    <div class="ground grass"></div>
    <div class="bigprop" style="left:4%;bottom:30%">🌲</div>
    <div class="bigprop" style="right:5%;bottom:32%">🌲</div>
    <div id="stumpzone">🪵🪵</div>
  </div>

  <!-- 6 ROADBLOCK -->
  <div class="scene" id="s-block">
    <div class="ground"></div>
  </div>

  <!-- 7 SMOG CHASE -->
  <div class="scene" id="s-smog">
    <div class="ground"></div>
    <div id="chasemeter"><i></i></div>
  </div>

  <!-- 8 END -->
  <div class="scene" id="s-end">
    <div id="badge"><span class="big">🏅</span>JUNIOR DETECTIVE<br><span style="color:#2563eb">CARMY</span><span class="big">💎→🏛️</span><span style="font-size:.6em">The crystal is back in the museum!</span></div>
    <button class="bigbtn" id="againbtn">▶ PLAY AGAIN</button>
  </div>
</div>

<script>
"use strict";
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const sleep = ms => new Promise(r => setTimeout(r, ms));
const stage = $("#stage");

/* ---------- tiny sounds (WebAudio) ---------- */
let AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === "suspended") AC.resume(); // iOS starts the context suspended
  return AC;
}
function tone(freq, dur, type = "sine", vol = .15, when = 0) {
  try {
    const a = ac(), o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime + when);
    g.gain.exponentialRampToValueAtTime(.001, a.currentTime + when + dur);
    o.connect(g); g.connect(a.destination);
    o.start(a.currentTime + when); o.stop(a.currentTime + when + dur + .05);
  } catch (e) {}
}
const ding  = () => { tone(660, .12); tone(880, .25, "sine", .15, .1); };
const buzz  = () => tone(120, .3, "sawtooth", .12);
const vroom = () => tone(90, .5, "sawtooth", .1);
const siren = () => { tone(700, .25, "square", .06); tone(500, .25, "square", .06, .25); tone(700, .25, "square", .06, .5); };
const fanfare = () => [523, 659, 784, 1047].forEach((f, i) => tone(f, .3, "triangle", .15, i * .15));

/* ---------- voice (Web Speech API — built into iPad Safari, offline) ---------- */
let voiceOn = true;
let enVoice = null;
function pickVoice() {
  if (!("speechSynthesis" in window)) return;
  const vs = speechSynthesis.getVoices();
  // prefer a high-quality US English voice (Samantha on iOS), else any English
  enVoice = vs.find(v => /en[-_]US/i.test(v.lang) && /samantha|premium|enhanced/i.test(v.name))
         || vs.find(v => /en[-_]US/i.test(v.lang))
         || vs.find(v => /^en/i.test(v.lang)) || null;
}
if ("speechSynthesis" in window) {
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
// each character gets their own pitch & speed
const VOICES = {
  Cooper:    { pitch: 1.0, rate: 0.95 },
  Oliver:    { pitch: 1.25, rate: 1.0 },
  Captain:   { pitch: 0.75, rate: 0.9 },
  Inspector: { pitch: 1.15, rate: 1.0 },
  Smog:      { pitch: 0.55, rate: 0.82 },
  Scrappy:   { pitch: 1.5,  rate: 1.1 },
  Moss:      { pitch: 0.8,  rate: 0.88 },
  Griffin:   { pitch: 0.45, rate: 0.85 },
  Ivan:      { pitch: 1.35, rate: 1.05 },
};
function speak(who, text) {
  if (!voiceOn || !("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const clean = text.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, "").trim();
    if (!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    const v = VOICES[who] || { pitch: 1, rate: 1 };
    u.pitch = v.pitch; u.rate = v.rate; u.lang = "en-US";
    if (enVoice) u.voice = enVoice;
    speechSynthesis.speak(u);
    speechSynthesis.resume(); // iOS sometimes leaves the queue paused
  } catch (e) {}
}
function stopSpeak() { try { if ("speechSynthesis" in window) speechSynthesis.cancel(); } catch (e) {} }

/* ---------- dialogue ---------- */
const bubble = $("#bubble");
function say(who, text, villain = false) {
  return new Promise(res => {
    bubble.querySelector(".who").textContent = who;
    bubble.querySelector(".txt").textContent = " " + text;
    bubble.classList.toggle("villain", villain);
    bubble.style.display = "block";
    speak(who, text);
    const h = () => { stage.removeEventListener("pointerdown", h); bubble.style.display = "none"; stopSpeak(); res(); };
    setTimeout(() => stage.addEventListener("pointerdown", h), 350);
  });
}

/* ---------- scenes & progress ---------- */
const SCENES = ["s-title","s-jail","s-museum","s-machine","s-brief","s-griffin","s-block","s-smog","s-end"];
const dots = $("#dots");
SCENES.slice(1, 8).forEach(() => { const d = document.createElement("span"); dots.appendChild(d); });
function show(id) {
  $$(".scene").forEach(s => s.classList.remove("on"));
  $("#" + id).classList.add("on");
  const i = SCENES.indexOf(id) - 1;
  [...dots.children].forEach((d, j) => { d.className = j < i ? "done" : (j === i ? "now" : ""); });
}

/* car factory */
function mkCar(scene, emoji, name, left, bottom, flip = false) {
  const c = document.createElement("div");
  c.className = "car" + (flip ? " flip" : "");
  c.innerHTML = emoji + (name ? `<span class="tag">${name}</span>` : "");
  c.style.left = left; c.style.bottom = bottom;
  $("#" + scene).appendChild(c);
  return c;
}
function clearCars(scene) { $$("#" + scene + " .car, #" + scene + " .boom").forEach(c => c.remove()); }
function boomAt(scene, x, y) {
  const b = document.createElement("div");
  b.className = "boom"; b.textContent = "💥";
  b.style.left = x; b.style.bottom = y;
  $("#" + scene).appendChild(b);
  setTimeout(() => b.remove(), 900);
}

/* generic temp button */
function tempBtn(scene, label, extraId) {
  const b = document.createElement("button");
  b.className = "bigbtn"; b.textContent = label;
  if (extraId) b.id = extraId;
  $("#" + scene).appendChild(b);
  return b;
}

/* drag helper: returns promise resolving when dropped near target */
function draggable(el, onDrop) {
  el.addEventListener("pointerdown", e => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    const move = ev => {
      el.style.left = (ev.clientX - el.offsetWidth / 2) + "px";
      el.style.top  = (ev.clientY - el.offsetHeight / 2) + "px";
      el.style.bottom = "auto";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      onDrop(ev);
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
  });
}
const near = (a, b, dist) => {
  const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
  return Math.hypot(ra.x + ra.width/2 - (rb.x + rb.width/2), ra.y + ra.height/2 - (rb.y + rb.height/2)) < dist;
};

/* ================= CHAPTER 1: JAILBREAK ================= */
async function ch1() {
  show("s-jail"); clearCars("s-jail");
  const scrappy = mkCar("s-jail", "🚙", "Scrappy", "110%", "30%");
  const ivan    = mkCar("s-jail", "🚚", "Ivan",    "120%", "30%");
  await sleep(300); vroom();
  scrappy.style.left = "55%"; ivan.style.left = "72%";
  await sleep(2300);
  await say("Scrappy", "We're getting him out tonight! Then we'll get the crystal…", true);
  boomAt("s-jail", "14%", "40%"); buzz();
  stage.classList.add("shakecam"); setTimeout(() => stage.classList.remove("shakecam"), 500);
  await sleep(600);
  const smog = mkCar("s-jail", "🚘", "SMOG", "12%", "30%");
  await sleep(400);
  await say("Smog", "Scrappy and Ivan! My two favorite cars! Ha ha ha!", true);
  vroom();
  smog.style.left = "130%"; scrappy.style.left = "140%"; ivan.style.left = "150%";
  await sleep(1500); siren();
  const cooper = mkCar("s-jail", "🚓", "Cooper", "-20%", "30%");
  await sleep(200); cooper.style.left = "40%";
  await sleep(2300);
  await say("Cooper", "Smog escaped from jail! Inspector, I need your help on this case!");
  await ch2();
}

/* ================= CHAPTER 2: MUSEUM CLUES ================= */
async function ch2() {
  show("s-museum"); clearCars("s-museum");
  $$("#s-museum .clue").forEach(c => c.remove());
  siren();
  const cooper = mkCar("s-museum", "🚓", "Cooper", "-20%", "30%");
  const oliver = mkCar("s-museum", "🚓", "Oliver", "-35%", "30%");
  await sleep(200); cooper.style.left = "8%"; oliver.style.left = "70%";
  await sleep(2300);
  await say("Cooper", "Oh no — the museum crystal is GONE! Inspector, find 3 clues with your magnifying glass!");
  const cc = $("#clue-count"); cc.style.display = "block"; $("#cluen").textContent = "0";
  const clues = [
    { e: "✨", x: "30%", y: "34%", line: "Broken glass! The thieves smashed the case." },
    { e: "🛞", x: "62%", y: "26%", line: "Tire tracks… from a limousine!" },
    { e: "🚂", x: "84%", y: "44%", line: "A train horn? There's no railroad here! Very suspicious…" },
  ];
  let found = 0;
  await new Promise(res => {
    clues.forEach(c => {
      const el = document.createElement("div");
      el.className = "clue"; el.innerHTML = c.e + '<div class="ring"></div>';
      el.style.left = c.x; el.style.bottom = c.y;
      $("#s-museum").appendChild(el);
      el.addEventListener("pointerdown", async () => {
        if (el.classList.contains("found")) return;
        el.classList.add("found"); ding();
        $("#cluen").textContent = ++found;
        await say("Inspector", "🔍 " + c.line);
        if (found === 3) res();
      });
    });
  });
  cc.style.display = "none";
  await say("Cooper", "Great detective work! The villains took the crystal to Professor Moss. Let's see what he did with it…");
  await ch3();
}

/* ================= CHAPTER 3: CRYSTAL MACHINE ================= */
async function ch3() {
  show("s-machine");
  const crystal = $("#crystal"), lamp = $("#lamp"), slot = $("#slot"),
        beam = $("#beamline"), ivy = $("#ivy");
  crystal.style.left = "12%"; crystal.style.top = "20%"; crystal.style.bottom = "auto";
  lamp.style.left = "78%"; lamp.style.top = "30%"; lamp.classList.remove("ready");
  beam.style.display = "none"; ivy.style.transform = "translateX(-50%) scale(0)";
  slot.textContent = "?";
  await say("Moss", "My special liquid only needs LIGHT through the crystal… then the magic ivy will grow!", true);
  await say("Cooper", "Inspector, show me how the machine worked. First: drag the 💎 into the machine!");
  await new Promise(res => {
    draggable(crystal, () => {
      if (near(crystal, slot, 80)) {
        const r = slot.getBoundingClientRect();
        crystal.style.left = (r.x + r.width/2 - crystal.offsetWidth/2) + "px";
        crystal.style.top  = (r.y + r.height/2 - crystal.offsetHeight/2) + "px";
        slot.textContent = ""; ding(); res();
      } else { buzz(); }
    });
  });
  await say("Cooper", "Now tap the 🔦 to shine the light!");
  lamp.classList.add("ready");
  await new Promise(res => lamp.addEventListener("pointerdown", res, { once: true }));
  lamp.classList.remove("ready");
  // draw beam from lamp to crystal
  const rl = lamp.getBoundingClientRect(), rc = crystal.getBoundingClientRect();
  const x1 = rl.x + rl.width * .2, y1 = rl.y + rl.height * .55,
        x2 = rc.x + rc.width / 2,  y2 = rc.y + rc.height / 2;
  beam.style.left = x1 + "px"; beam.style.top = y1 + "px";
  beam.style.width = Math.hypot(x2 - x1, y2 - y1) + "px";
  beam.style.transform = `rotate(${Math.atan2(y2 - y1, x2 - x1)}rad)`;
  beam.style.display = "block";
  tone(1200, .8, "sine", .1); await sleep(900);
  ivy.style.transform = "translateX(-50%) scale(1)"; fanfare();
  await sleep(1700);
  await say("Smog", "The magic ivy is MINE! Now… TO THE BANK! The vault door won't stop me now! Ha ha!", true);
  await say("Cooper", "He's robbing the bank with that ivy! Back to the station — the Captain has a plan.");
  await ch4();
}

/* ================= CHAPTER 4: BRIEFING QUIZ ================= */
async function ch4() {
  show("s-brief");
  await say("Captain", "Listen up! Six villains are loose. Inspector — prove you know them!");
  const QS = [
    { q: "Who has TRAIN WHEELS and knocks out the power?",
      opts: [["⚡🚚","Ivan the Outage",1],["🚘","Smog",0],["🧪","Prof. Moss",0]] },
    { q: "Who is the train with MONSTER TRUCK wheels — strong and fast?",
      opts: [["🚙","Scrappy",0],["🚂","Griffin",1],["🚛","Shadow",0]] },
    { q: "Who is Smog's hide-and-getaway TRUCK?",
      opts: [["🚛","Shadow",1],["⚡🚚","Ivan",0],["🚂","Griffin",0]] },
  ];
  const sc = $("#s-brief");
  for (const item of QS) {
    const qEl = document.createElement("div"); qEl.className = "quizq"; qEl.textContent = item.q;
    const box = document.createElement("div"); box.className = "quizopts";
    sc.appendChild(qEl); sc.appendChild(box);
    await new Promise(res => {
      item.opts.sort(() => Math.random() - .5).forEach(([face, name, ok]) => {
        const o = document.createElement("div");
        o.className = "qopt"; o.innerHTML = `<span class="face">${face}</span>${name}`;
        box.appendChild(o);
        o.addEventListener("pointerdown", () => {
          if (ok) { o.classList.add("right"); ding(); setTimeout(res, 700); }
          else { o.classList.add("wrong"); buzz(); setTimeout(() => o.classList.remove("wrong"), 450); }
        });
      });
    });
    qEl.remove(); box.remove();
  }
  await say("Captain", "Perfect! Operation starts NOW. First target: Griffin is escaping through the forest!");
  await ch5();
}

/* ================= CHAPTER 5a: GRIFFIN & THE STUMPS ================= */
async function ch5() {
  show("s-griffin"); clearCars("s-griffin");
  await say("Cooper", "Griffin is too strong to stop… but look — TREE STUMPS! Tap the button when he's right on top of them!");
  const griffin = mkCar("s-griffin", "🚂", "Griffin", "-25%", "12%");
  griffin.style.transition = "none";
  const btn = tempBtn("s-griffin", "🪵 STUMPS!", "stumpbtn");
  const zone = $("#stumpzone");
  let x = -25, caught = false, raf, last = performance.now();
  const speed = 28; // percent per second — time-based so it plays the same on 60Hz and 120Hz screens
  function loop(now) {
    const dt = Math.min((now - last) / 1000, .1); last = now;
    x += speed * dt;
    if (x > 110) x = -25;
    griffin.style.left = x + "%";
    if (!caught) raf = requestAnimationFrame(loop);
  }
  raf = requestAnimationFrame(loop); vroom();
  await new Promise(res => {
    btn.addEventListener("pointerdown", async () => {
      const rg = griffin.getBoundingClientRect(), rz = zone.getBoundingClientRect();
      const gx = rg.x + rg.width / 2;
      if (gx > rz.x && gx < rz.x + rz.width) {
        caught = true; cancelAnimationFrame(raf);
        boomAt("s-griffin", x + "%", "26%"); buzz(); stage.classList.add("shakecam");
        setTimeout(() => stage.classList.remove("shakecam"), 500);
        griffin.style.transform = "rotate(12deg)";
        await sleep(700);
        await say("Griffin", "My tire! These STUMPS! I can't stop! Nooo!", true);
        res();
      } else { buzz(); }
    });
  });
  btn.remove();
  await say("Cooper", "Griffin is down! Oliver just arrested Professor Moss, too. Next: Shadow is racing down the highway!");
  await ch6();
}

/* ================= CHAPTER 5b: ROADBLOCK ================= */
async function ch6() {
  show("s-block"); clearCars("s-block");
  $$("#s-block .barrier, #s-block .bslot").forEach(e => e.remove());
  await say("Captain", "Shadow is coming with Smog hiding inside! Drag all 3 barriers 🚧 onto the road!");
  const sc = $("#s-block");
  const slots = [];
  ["58%","70%","82%"].forEach(left => {
    const s = document.createElement("div");
    s.className = "bslot"; s.style.left = left; s.style.bottom = "12%";
    sc.appendChild(s); slots.push(s);
  });
  let placed = 0;
  await new Promise(res => {
    ["6%","6%","6%"].forEach((left, i) => {
      const b = document.createElement("div");
      b.className = "barrier"; b.textContent = "🚧";
      b.style.left = left; b.style.top = (12 + i * 26) + "%";
      sc.appendChild(b);
      draggable(b, () => {
        const hit = slots.find(s => !s.classList.contains("filled") && near(b, s, 70));
        if (hit) {
          const r = hit.getBoundingClientRect();
          b.style.left = (r.x + r.width/2 - b.offsetWidth/2) + "px";
          b.style.top  = (r.y + r.height/2 - b.offsetHeight/2) + "px";
          hit.classList.add("filled"); ding();
          if (++placed === 3) res();
        } else buzz();
      });
    });
  });
  const shadow = mkCar("s-block", "🚛", "Shadow", "-25%", "30%");
  vroom(); await sleep(150);
  shadow.style.left = "30%";
  await sleep(2300); siren();
  await say("Cooper", "Shadow, STOP! The road is blocked — there's nowhere to run! You're under arrest!");
  await say("Smog", "You'll never catch ME! Scrappy, follow me!", true);
  const smog = mkCar("s-block", "🚘", "SMOG", "34%", "42%");
  const scrappy = mkCar("s-block", "🚙", "Scrappy", "28%", "54%");
  smog.style.left = "130%"; scrappy.style.left = "125%"; vroom();
  await sleep(1800);
  await say("Cooper", "Smog is getting away! Inspector — help me CHASE him!");
  await ch7();
}

/* ================= CHAPTER 5c: SMOG CHASE ================= */
async function ch7() {
  show("s-smog"); clearCars("s-smog");
  const smog   = mkCar("s-smog", "🚘", "SMOG",   "70%", "30%");
  const cooper = mkCar("s-smog", "🚓", "Cooper", "2%",  "30%");
  smog.style.transition = "left .3s"; cooper.style.transition = "left .3s";
  await say("Smog", "What's wrong, Cooper? Can't catch me? Ha ha ha!", true);
  await say("Cooper", "TAP! TAP! TAP! the boost button — full speed!");
  const meter = $("#chasemeter"); meter.style.display = "block";
  const bar = meter.querySelector("i"); bar.style.width = "0%";
  const btn = tempBtn("s-smog", "🚨 BOOST!", "boostbtn");
  let p = 0;
  // smog idles forward, cooper closes in per tap
  const idle = setInterval(() => { p = Math.max(0, p - 1); paint(); }, 600);
  function paint() {
    bar.style.width = p + "%";
    cooper.style.left = (2 + p * .55) + "%";
    smog.style.left = (70 + Math.min(p, 90) * .12) + "%";
  }
  await new Promise(res => {
    btn.addEventListener("pointerdown", () => {
      tone(200 + p * 8, .08, "square", .08);
      p += 7; paint();
      if (p >= 100) { clearInterval(idle); res(); }
    });
  });
  btn.remove(); siren();
  boomAt("s-smog", "82%", "40%");
  smog.style.transform = "rotate(-8deg)";
  await sleep(700);
  meter.style.display = "none";
  await say("Smog", "What?! Ah! NO!", true);
  await say("Cooper", "Smog… you're UNDER ARREST! Well done, team!");
  await ch8();
}

/* ================= CHAPTER 6: CASE CLOSED ================= */
async function ch8() {
  show("s-end"); fanfare();
  for (let i = 0; i < 26; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = ["🎉","⭐","💎","🚓","🎊"][i % 5];
    c.style.left = Math.random() * 100 + "%";
    c.style.animationDuration = (2.5 + Math.random() * 3) + "s";
    c.style.animationDelay = (Math.random() * 2) + "s";
    $("#s-end").appendChild(c);
  }
  await sleep(600);
  await say("Cooper", "My name is Cooper. My name is Oliver. And Carmy… YOU are a real city hero! 🏅");
}

/* debug hook: jump to any chapter from the console, e.g. COOPER.ch5() */
window.COOPER = { ch1, ch2, ch3, ch4, ch5, ch6, ch7, ch8, show };

/* ---------- boot ---------- */
$("#voicebtn").addEventListener("pointerdown", e => {
  e.stopPropagation();
  voiceOn = !voiceOn;
  $("#voicebtn").textContent = voiceOn ? "🔊" : "🔇";
  $("#voicebtn").classList.toggle("off", !voiceOn);
  if (!voiceOn) stopSpeak();
});
$("#startbtn").addEventListener("pointerdown", () => {
  ac(); siren();
  // iOS unlocks speechSynthesis ONLY when speak() runs inside a real tap.
  // Speak a tiny real utterance here to prime the engine for the rest of the game.
  if ("speechSynthesis" in window) {
    try {
      speechSynthesis.cancel();
      speechSynthesis.speak(new SpeechSynthesisUtterance("Sergeant Cooper"));
      speechSynthesis.resume();
    } catch (e) {}
  }
  ch1();
});
$("#againbtn").addEventListener("pointerdown", () => {
  $$(".confetti").forEach(c => c.remove());
  show("s-title");
});

/* register service worker so the game works fully OFFLINE after first visit */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
